# 线程池和读超时（毫秒）
worker-threads=8
read-timeout-ms=3000

# 控制器数量
controller.count=4

# 默认参数（可被 controller.N.* 覆盖）
default.bind-host=0.0.0.0
default.unit-id=1
default.start-register=101
default.probe-count=4
default.random-min=0
default.random-max=1000

# 4 个 mock 串口服务器（用不同端口）
controller.1.id=mock-ctrl-1
controller.1.port=15021
controller.1.probe-count=4

controller.2.id=mock-ctrl-2
controller.2.port=15022
controller.2.probe-count=2

controller.3.id=mock-ctrl-3
controller.3.port=15023
controller.3.probe-count=4

controller.4.id=mock-ctrl-4
controller.4.port=15024
controller.4.probe-count=7

# 可以按控制器单独覆盖随机范围
# controller.1.random-min=0
# controller.1.random-max=500
