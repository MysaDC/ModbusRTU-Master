# 轮询周期(ms)
poll.interval.ms=30000

# Modbus 默认参数（各控制器可继承）
modbus.port=502
modbus.unit-id=1
modbus.start-register=101
modbus.channel-count=128
modbus.timeout.ms=3000
modbus.max-retries=3
modbus.retry-backoff.ms=1000

# 串口服务器 CRC 校验策略（RTU over TCP）
# true: 启用 CRC 校验过滤（启用后若校验不通过则丢弃整帧数据）
modbus.crc-check.enabled=true
# CRC 失败后是否立即重试该整帧
modbus.crc-failure.immediate-retry=true
# CRC 持续失败或请求失败时，该整帧在“下一次轮询前”的最大重试次数
modbus.crc-failure.max-retries-until-next-poll=1

# 多控制器配置（同 topic 上报）
# 注意：通过 controllers.N.host 配置串口服务器地址（控制器IP）
# 可按实际探头数分别配置 channel-count，例子总计 17 个探头
controllers.count=4

controllers.1.id=ctrl-1
controllers.1.host=127.0.0.1
controllers.1.port=15021
controllers.1.channel-count=4

controllers.2.id=ctrl-2
controllers.2.host=127.0.0.1
controllers.2.port=15022
controllers.2.channel-count=2

controllers.3.id=ctrl-3
controllers.3.host=127.0.0.1
controllers.3.port=15023
controllers.3.channel-count=4

controllers.4.id=ctrl-4
controllers.4.host=127.0.0.1
controllers.4.port=15024
controllers.4.channel-count=7

# 浓度换算：concentration = raw * scale + offset
concentration.scale=1.0
concentration.offset=0.0

# MQTT 上报参数（同 topic）
# ws://192.168.2.22:8083/mqtt
mqtt.broker-uri=tcp://192.168.2.22:1883     
mqtt.client-id=qb6000-das-client
mqtt.topic=sensor/qb6000
mqtt.qos=2
mqtt.retain=false
mqtt.username=
mqtt.password=
mqtt.connection-timeout-seconds=5
