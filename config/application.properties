# 轮询周期(ms)
poll.interval.ms=60000

# Modbus 默认参数（各控制器可继承）
# Modbus TCP 端口（串口服务器/控制器监听端口）
modbus.port=502
# Modbus 从站地址（Unit ID）
modbus.unit-id=1
# 起始寄存器地址（按协议定义）
modbus.start-register=101
# 连续读取的通道数量（寄存器数量）
modbus.channel-count=128
# 单次 Modbus 请求超时时间(ms)
modbus.timeout.ms=3000
# 请求失败后的最大重试次数
modbus.max-retries=3
# 每次重试前的退避等待时间(ms)
modbus.retry-backoff.ms=1000
# 是否打印 Modbus 报文十六进制日志
modbus.hex-log.enabled=false

# 串口服务器 CRC 校验策略（RTU over TCP）
# true: 启用 CRC 校验过滤（启用后若校验不通过则丢弃整帧数据）
modbus.crc-check.enabled=true
# CRC 失败后是否立即重试该整帧
modbus.crc-failure.immediate-retry=true
# CRC 持续失败或请求失败时，该整帧在“下一次轮询前”的最大重试次数
modbus.crc-failure.max-retries-until-next-poll=1

# 多控制器配置（同 topic 上报）
# 注意：通过 controllers.N.host 配置串口服务器地址（控制器IP）
# 可按实际探头数分别配置 channel-count，例子总计 18 个探头
controllers.count=4

controllers.1.id=厨房
controllers.1.host=10.65.110.95
controllers.1.port=4001
controllers.1.channel-count=4

controllers.2.id=油漆房
controllers.2.host=10.65.110.96
controllers.2.port=4001
controllers.2.channel-count=2

controllers.3.id=喷漆
controllers.3.host=10.65.110.97
controllers.3.port=4001
controllers.3.channel-count=4

controllers.4.id=危废室
controllers.4.host=10.65.110.98
controllers.4.port=4001
controllers.4.channel-count=8

# 浓度换算：concentration = raw * scale + offset
concentration.scale=1.0
concentration.offset=0.0

# MQTT 上报参数（同 topic）
# ws://10.64.110.246:10008/mqtt
mqtt.broker-uri=tcp://10.64.110.246:10008     
mqtt.client-id=qb6000-das-client
mqtt.topic=sensor/qb6000
mqtt.qos=2
mqtt.retain=false
mqtt.username=
mqtt.password=
mqtt.connection-timeout-seconds=5
