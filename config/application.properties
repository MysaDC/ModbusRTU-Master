# 轮询周期(ms)
poll.interval.ms=5000

# Modbus 默认参数（各控制器可继承）
modbus.port=502
modbus.unit-id=1
modbus.start-register=101
modbus.channel-count=128
modbus.timeout.ms=3000
modbus.max-retries=5
modbus.retry-backoff.ms=1000

# 多控制器配置（同 topic 上报）
# 注意：通过 controllers.N.host 配置串口服务器地址（控制器IP）
# 可按实际探头数分别配置 channel-count，例子总计 17 个探头
controllers.count=4

controllers.1.id=ctrl-1
controllers.1.host=192.168.10.11
controllers.1.port=502
controllers.1.channel-count=4

controllers.2.id=ctrl-2
controllers.2.host=192.168.10.12
controllers.2.port=502
controllers.2.channel-count=2

controllers.3.id=ctrl-3
controllers.3.host=192.168.10.13
controllers.3.port=502
controllers.3.channel-count=4

controllers.4.id=ctrl-4
controllers.4.host=192.168.10.14
controllers.4.port=502
controllers.4.channel-count=7

# 浓度换算：concentration = raw * scale + offset
concentration.scale=1.0
concentration.offset=0.0

# MQTT 上报参数（同 topic）
# ws://192.168.2.22:8083/mqtt
mqtt.broker-uri=tcp://192.168.2.22:1883     
mqtt.client-id=qb6000-das-client
mqtt.topic=sensor/qb6000
mqtt.qos=2
mqtt.retain=false
mqtt.username=
mqtt.password=
mqtt.connection-timeout-seconds=5
